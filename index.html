<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
    <title>Calculadora Simples</title>
</head>

<body>

    <main>
        <h1>Calculadora Simples</h1>

        <div class="form-group">
            <label for="n1">Primeiro Número</label>
            <input type="text" id="n1" placeholder="Digite um número:" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="n2">Primeiro Número</label>
            <input type="text" id="n2" placeholder="Digite um número:" autocomplete="off">
        </div>

        <div class="botoes">
            <button onclick="somar()">Soma (+)</button>
            <button onclick="subtrair()">Subtração (-)</button>
            <button onclick="multiplicar()">Multiplicação (x)</button>
            <button onclick="dividir()">Divisão (/)</button>
        </div>

        <div class="resultado">
            <p>Resultado: <span id="resultado">0</span></p>
        </div>
    </main>

    <script src="calcu.js"></script>

</body>

</html>
